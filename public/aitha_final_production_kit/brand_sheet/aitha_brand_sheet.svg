<text x="1180" y="690" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#101828">Usage Note</text>
<text x="1180" y="740" font-family="Inter, Arial, sans-serif" font-size="23" fill="#475467">Use the icon alone for favicons, apps,</text>
<text x="1180" y="775" font-family="Inter, Arial, sans-serif" font-size="23" fill="#475467">social avatars, and small ad placements.</text>
<text x="1180" y="830" font-family="Inter, Arial, sans-serif" font-size="23" fill="#475467">Use the horizontal logo for website,</text>
<text x="1180" y="865" font-family="Inter, Arial, sans-serif" font-size="23" fill="#475467">sales decks, print, and landing pages.</text>

